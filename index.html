<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Física — Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
}

/* ── VIDEO ── */
video {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ── CINEMATIC BARS ── */
.bar-top, .bar-bottom {
  position: fixed;
  left: 0; right: 0;
  z-index: 2;
  background: #000;
  transition: height 1.2s cubic-bezier(.76,0,.24,1);
}
.bar-top    { top: 0;    height: 18vh; }
.bar-bottom { bottom: 0; height: 18vh; }

/* ── GRADIENT OVER VIDEO ── */
.veil {
  position: fixed; inset: 0; z-index: 1;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,.0) 18%,
      rgba(0,0,0,.38) 50%,
      rgba(0,0,0,.0) 82%
    );
}

/* ── CONTENT ── */
main {
  position: fixed; inset: 0; z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  opacity: 0;
  transition: opacity .6s ease .9s;
}
main.show { opacity: 1; }

/* label */
.label {
  font-family: 'Courier Prime', monospace;
  font-size: .62rem;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: rgba(255,255,255,.28);
  margin-bottom: 2rem;
  animation: fadeUp .7s ease 1.1s both;
}

/* big title */
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 13vw, 190px);
  line-height: .88;
  letter-spacing: .025em;
  color: #fff;
  text-align: center;
  animation: fadeUp .9s cubic-bezier(.16,1,.3,1) 1.25s both;
}
h1 em {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  color: rgba(255,255,255,.55);
  font-size: .72em;
  letter-spacing: 0;
  display: block;
  margin-top: -.1em;
}

/* rule */
.rule {
  width: 0; height: 1px;
  background: rgba(255,255,255,.18);
  margin: 2.4rem 0;
  animation: ruleGrow .8s ease 1.6s both;
}

/* buttons */
.btns {
  display: flex;
  gap: 1.2rem;
  animation: fadeUp .6s ease 1.8s both;
}

a.btn {
  font-family: 'Courier Prime', monospace;
  font-size: .68rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  text-decoration: none;
  color: #fff;
  padding: .7rem 1.6rem;
  border: 1px solid rgba(255,255,255,.22);
  position: relative;
  overflow: hidden;
  transition: color .35s ease, border-color .35s ease;
  display: inline-flex;
  align-items: center;
  gap: .65rem;
  white-space: nowrap;
}

a.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.1);
  transform: translateX(-105%);
  transition: transform .45s cubic-bezier(.76,0,.24,1);
}
a.btn:hover::before { transform: translateX(0); }
a.btn:hover { border-color: rgba(255,255,255,.55); }

a.btn svg {
  width: 10px; height: 10px;
  flex-shrink: 0;
  transition: transform .35s ease;
  position: relative;
}
a.btn:hover svg { transform: translateX(3px); }

/* index nums */
.num {
  font-family: 'Courier Prime', monospace;
  font-size: .5rem;
  color: rgba(255,255,255,.2);
  letter-spacing: .1em;
  margin-right: .1rem;
}

/* corner ticks */
.tick {
  position: fixed;
  z-index: 4;
  width: 24px; height: 24px;
  opacity: 0;
  animation: fadeIn .5s ease 2s both;
}
.tick::before, .tick::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,.2);
}
.tick::before { width: 100%; height: 1px; top: 0; left: 0; }
.tick::after  { width: 1px; height: 100%; top: 0; left: 0; }

.tick.tl { top: 2rem; left: 2rem; }
.tick.tr { top: 2rem; right: 2rem; transform: scaleX(-1); }
.tick.bl { bottom: 2rem; left: 2rem; transform: scaleY(-1); }
.tick.br { bottom: 2rem; right: 2rem; transform: scale(-1); }

/* bottom label */
.bottom-label {
  position: fixed;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  font-family: 'Courier Prime', monospace;
  font-size: .46rem;
  letter-spacing: .24em;
  text-transform: uppercase;
  color: rgba(255,255,255,.18);
  opacity: 0;
  animation: fadeIn .5s ease 2.1s both;
  white-space: nowrap;
}

/* ── KEYFRAMES ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}
@keyframes ruleGrow {
  from { width: 0; opacity: 0; }
  to   { width: 240px; opacity: 1; }
}

/* mobile */
@media (max-width: 540px) {
  .btns { flex-direction: column; gap: .8rem; align-items: center; }
  h1 { font-size: clamp(58px, 18vw, 90px); }
}
</style>
</head>
<body>

<video autoplay loop muted playsinline>
  <source src="https://res.cloudinary.com/dfonotyfb/video/upload/v1775585556/dds3_1_rqhg7x.mp4" type="video/mp4">
</video>

<div class="veil"></div>
<div class="bar-top"></div>
<div class="bar-bottom"></div>

<div class="tick tl"></div>
<div class="tick tr"></div>
<div class="tick bl"></div>
<div class="tick br"></div>

<main id="main">
  <p class="label">2° Medio · Física · 2025</p>

  <h1>PROYECTOS<em>de física</em></h1>

  <div class="rule"></div>

  <div class="btns">
    <a class="btn" href="https://e8d26533.cr7-knuckleball.pages.dev" target="_blank">
      <span class="num">01</span>
      Knuckleball CR7
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
    <a class="btn" href="https://b2564ce7.iss-page.pages.dev" target="_blank">
      <span class="num">02</span>
      Estación Espacial
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</main>

<div class="bottom-label">— 01 / 02 —</div>

<script>
window.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelector('.bar-top').style.height    = '0';
    document.querySelector('.bar-bottom').style.height = '0';
    document.getElementById('main').classList.add('show');
  }, 120);
});
</script>
</body>
</html>
